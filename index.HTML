<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Caducidades</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>Control de Caducidades</h1>

<div class="formulario">

<input id="codigo" placeholder="Código">
<input id="producto" placeholder="Producto">
<input id="piezas" type="number" placeholder="Piezas">
<input id="lote" placeholder="Lote">

<select id="categoria"></select>

<input id="caducidad" type="date">

<button onclick="agregarProducto()">Agregar</button>

</div>

<div class="contadores">

🟢 Bien: <span id="contadorBien">0</span>
🟡 Regular: <span id="contadorRegular">0</span>
🔴 Mal: <span id="contadorMal">0</span>

</div>

<div class="acciones">

<button onclick="generarPDF()">Generar PDF</button>

</div>

<table id="tabla">

<thead>

<tr>
<th>Código</th>
<th>Producto</th>
<th>Piezas</th>
<th>Lote</th>
<th>Días</th>
<th>Etapa</th>
<th>Estado</th>
<th>Acción</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script src="app.js"></script>

</body>
</html>
